version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-badge-postgres
    environment:
      POSTGRES_USER: ai_badge
      POSTGRES_PASSWORD: ai_badge_dev
      POSTGRES_DB: ai_badge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_badge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-badge-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_badge:ai_badge_dev@postgres:5432/ai_badge
      DATABASE_URL_SYNC: postgresql://ai_badge:ai_badge_dev@postgres:5432/ai_badge
      SECRET_KEY: dev-secret-key-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data/audio:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
